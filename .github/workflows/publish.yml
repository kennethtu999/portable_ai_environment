name: Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Build ZIPs + generate docs site ──────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Windows ZIP
        run: ./dev/build_zip.sh

      - name: Build macOS ZIP
        run: ./dev/build_zip_mac.sh

      - name: Generate docs site
        run: |
          mkdir -p _site
          cp app/ai-env-guide.md _site/
          cp app/ai-env-guide.md app-mac/ai-env-guide.md
          cp app/README.md _site/windows-setup.md
          cp app-mac/README.md _site/mac-setup.md 2>/dev/null || cp app/README.md _site/mac-setup.md
          cp docs/index.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Upload ZIPs artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-zips
          path: dist/

  # ── Deploy GitHub Pages ───────────────────────────────────────────────────────
  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ── Publish to GitHub Releases ────────────────────────────────────────────────
  release:
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-zips
          path: dist

      # main push → update floating "latest" release (non-prerelease so /releases/latest/download/ works)
      - name: Publish latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest (main)
          prerelease: false
          make_latest: false
          files: |
            dist/portable_claude_env.zip
            dist/portable_claude_env_mac.zip

      # tag push (v1.2.3) → create stable versioned release
      - name: Publish stable release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/portable_claude_env.zip
            dist/portable_claude_env_mac.zip
