name: Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Build ZIPs + generate docs site ──────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Windows ZIP
        run: ./dev/build_zip.sh

      - name: Build macOS ZIP
        run: ./dev/build_zip_mac.sh

      - name: Generate docs site
        run: |
          mkdir -p _site
          cp app/ai-env-guide.md _site/
          cp app/ai-env-guide.md app-mac/ai-env-guide.md
          cp app/README.md _site/windows-setup.md
          cp app-mac/README.md _site/mac-setup.md 2>/dev/null || cp app/README.md _site/mac-setup.md
          cat > _site/index.html << 'ENDOFHTML'
          <!DOCTYPE html>
          <html lang="zh-TW">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>Portable AI Terminal</title>
            <style>
              body{font-family:system-ui,sans-serif;max-width:680px;margin:60px auto;padding:0 24px;color:#24292f}
              h1{font-size:1.8em;margin-bottom:.3em}
              .sub{color:#57606a;margin-bottom:2.5em}
              .step{border:1px solid #d0d7de;border-radius:8px;padding:20px 24px;margin-bottom:1.5em}
              .step-label{font-size:.75em;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#57606a;margin-bottom:.5em}
              .step-title{font-size:1.1em;font-weight:600;margin-bottom:1em}
              pre{background:#f6f8fa;border:1px solid #d0d7de;border-radius:6px;padding:14px;overflow-x:auto;font-size:.85em;line-height:1.6;margin:.6em 0}
              .cmd{background:#1e3a5f;color:#e2e8f0;border-radius:6px;padding:10px 14px;font-family:monospace;font-size:.88em;line-height:1.8;margin:.6em 0;user-select:all}
              .note{background:#fffbeb;border:1px solid #fcd34d;border-radius:6px;padding:10px 14px;font-size:.88em;margin-top:.8em}
              ol{margin:.4em 0 0 1.2em;padding:0;line-height:2}
              code{background:#f6f8fa;border:1px solid #d0d7de;padding:1px 5px;border-radius:4px;font-size:.88em}
              .links{margin-top:.8em;font-size:.88em}
              footer{margin-top:3em;padding-top:1em;border-top:1px solid #d0d7de;font-size:.85em;color:#57606a}
              a{color:#0969da;text-decoration:none}
              .platform{color:#57606a;font-size:.82em;margin-left:.4em}
            </style>
          </head>
          <body>
            <h1>Portable AI Terminal</h1>
            <p class="sub">Claude Code 環境 &middot; 免系統安裝 &middot; 免管理員權限</p>

            <!-- Prerequisites -->
            <div class="step">
              <div class="step-label">前置準備</div>
              <div class="step-title">取得 API Token 及 API URL</div>
              <p style="font-size:.9em;color:#57606a;margin-bottom:.8em">向系統管理員或 API 平台取得以下兩項資訊，後續步驟會用到：</p>
              <table style="width:100%;font-size:.88em;border-collapse:collapse">
                <tr style="background:#f6f8fa">
                  <th style="text-align:left;padding:8px 12px;border:1px solid #d0d7de">項目</th>
                  <th style="text-align:left;padding:8px 12px;border:1px solid #d0d7de">說明</th>
                  <th style="text-align:left;padding:8px 12px;border:1px solid #d0d7de">範例格式</th>
                </tr>
                <tr>
                  <td style="padding:8px 12px;border:1px solid #d0d7de"><code>API Token</code></td>
                  <td style="padding:8px 12px;border:1px solid #d0d7de">用於身份驗證的金鑰</td>
                  <td style="padding:8px 12px;border:1px solid #d0d7de;color:#57606a">sk-ant-... 或平台自訂格式</td>
                </tr>
                <tr style="background:#f6f8fa">
                  <td style="padding:8px 12px;border:1px solid #d0d7de"><code>API URL</code></td>
                  <td style="padding:8px 12px;border:1px solid #d0d7de">API 閘道的完整端點</td>
                  <td style="padding:8px 12px;border:1px solid #d0d7de;color:#57606a">https://your-gateway.example.com/abc</td>
                </tr>
              </table>
              <div class="note" style="background:#fffbeb;border:1px solid #fcd34d;border-radius:6px;padding:10px 14px;font-size:.88em;margin-top:.8em">
                &#x1F4CC; 使用 Anthropic 公開 API 的使用者：Token 請至
                <a href="https://console.anthropic.com/settings/keys" target="_blank">Anthropic Console</a>
                取得；API URL 選「直接連線」並留空（使用預設）。
              </div>
            </div>

            <!-- Step 1 -->
            <div class="step">
              <div class="step-label">步驟一</div>
              <div class="step-title">環境準備</div>
              <p style="font-size:.9em;color:#57606a;margin-bottom:.8em">進入你的專案資料夾，下載並執行 init：</p>

              <b style="font-size:.85em">Windows</b>
              <pre>mkdir ai-env &amp;&amp; cd ai-env
curl -L -o env.zip https://github.com/kennethtu999/portable_ai_environment/releases/latest/download/portable_claude_env.zip
tar -xf env.zip &amp;&amp; cd ..
ai-env\init.bat</pre>
              <p class="links"><a href="windows-setup.md">Windows 完整說明</a></p>

              <b style="font-size:.85em;display:block;margin-top:1em">macOS</b>
              <pre>mkdir ai-env &amp;&amp; cd ai-env
curl -L -o env.zip https://github.com/kennethtu999/portable_ai_environment/releases/latest/download/portable_claude_env_mac.zip
tar -xf env.zip &amp;&amp; cd ..
ai-env/init.sh</pre>
              <p class="links"><a href="mac-setup.md">macOS 完整說明</a></p>
            </div>

            <!-- Step 2 -->
            <div class="step">
              <div class="step-label">步驟二</div>
              <div class="step-title">輸入 API Token 及 API URL</div>
              <p style="font-size:.9em;color:#57606a;margin-bottom:.8em">init 執行中會出現以下提示，依序輸入：</p>
              <pre>Select connection mode:
  1. Via local proxy  (proxy runs at localhost)
  2. Direct connection  (no local proxy)
Choice [1]: <b>1</b>

Enter API token: <b>（直接輸入 Token，輸入時會顯示）</b>
Proxy port [8888]: <b>（按 Enter 使用預設，或輸入指定 port）</b>
Gateway host []: <b>https://your-api-gateway.example.com/path</b></pre>
              <div class="note">&#x1F4CC; Token 輸入時<b>會顯示在畫面上</b>，請確認貼入內容正確後再按 Enter。設定儲存後下次不再詢問。</div>
            </div>

            <!-- Step 3 -->
            <div class="step">
              <div class="step-label">步驟三</div>
              <div class="step-title">專案初始化</div>
              <ol>
                <li>執行 <code>cc.bat</code> <span class="platform">Windows</span> 或 <code>ai-env/cc.sh</code> <span class="platform">macOS</span> 開啟 Claude</li>
                <li>切換至 Sonnet 1M context 模型：
                  <div class="cmd">/model</div>
                  <span style="font-size:.85em;color:#57606a">選擇 Sonnet 4.6 (1M context) 並設為預設</span>
                </li>
                <li>建立 AI 協作文件：
                  <div class="cmd">ai-env\new-project.bat <span style="color:#94a3b8"># Windows</span><br>ai-env/new-project.sh <span style="color:#94a3b8"># macOS</span></div>
                </li>
                <li>在 Claude 對話中執行 <code>/init</code>，完成後確認 <code>CLAUDE.md</code> 結尾有 <code>@AGENTS.md</code></li>
                <li>輸入以下 Prompt：
                  <div class="cmd">閱讀 ai-env/ai-env-guide.md，了解可用工具與環境設定</div>
                </li>
              </ol>
            </div>

            <footer>
              <a href="ai-env-guide.md">AI Guide</a> &nbsp;&middot;&nbsp;
              <a href="https://github.com/kennethtu999/portable_ai_environment">GitHub</a>
            </footer>
          </body>
          </html>
          ENDOFHTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Upload ZIPs artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-zips
          path: dist/

  # ── Deploy GitHub Pages ───────────────────────────────────────────────────────
  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ── Publish to GitHub Releases ────────────────────────────────────────────────
  release:
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-zips
          path: dist

      # main push → update floating "latest" release (non-prerelease so /releases/latest/download/ works)
      - name: Publish latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest (main)
          prerelease: false
          make_latest: false
          files: |
            dist/portable_claude_env.zip
            dist/portable_claude_env_mac.zip

      # tag push (v1.2.3) → create stable versioned release
      - name: Publish stable release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/portable_claude_env.zip
            dist/portable_claude_env_mac.zip
